<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindScan — {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<canvas id="neuralCanvas"></canvas>

<nav class="nav">
  <a href="{{ url_for('index') }}" class="nav-brand">
    <div class="nav-logo-mark">🧠</div>
    <div>
      <span class="nav-brand-name">MindScan</span>
      <span class="nav-brand-sub">Mental Health Platform</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="{{ url_for('index') }}"     {% if request.endpoint=='index'      %}class="active"{% endif %}>Home</a></li>
    <li><a href="{{ url_for('depression') }}" {% if request.endpoint=='depression'  %}class="active"{% endif %}>Assessment</a></li>
    <li><a href="{{ url_for('sentiment') }}"  {% if request.endpoint=='sentiment'   %}class="active"{% endif %}>Sentiment</a></li>
    <li><a href="{{ url_for('emotion') }}"    {% if request.endpoint=='emotion'     %}class="active"{% endif %}>Emotion</a></li>
    <li><a href="{{ url_for('result') }}"     {% if request.endpoint=='result'      %}class="active"{% endif %}>Results</a></li>
    <li><a href="{{ url_for('logout') }}" class="nav-logout">Logout</a></li>
  </ul>
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<footer class="footer">
  MindScan Mental Health Analysis Platform &copy; 2024 &nbsp;·&nbsp; Not a substitute for professional diagnosis
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
